<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neraium | Systemic Infrastructure Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* ---------- NAV ---------- */

nav{
position:fixed;
top:0;
left:0;
right:0;
height:72px;
background:rgba(0,0,0,.9);
backdrop-filter:blur(10px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 60px;
border-bottom:1px solid rgba(255,255,255,.06);
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:14px;
font-weight:600;
letter-spacing:.12em;
}

.logo-box{
width:34px;
height:34px;
border-radius:8px;
background:#fff;
color:#000;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}

nav ul{
list-style:none;
display:flex;
gap:42px;
}

nav a{
text-decoration:none;
color:rgba(255,255,255,.55);
font-size:12px;
letter-spacing:.18em;
text-transform:uppercase;
transition:.25s;
}

nav a:hover{
color:#fff;
}

/* ---------- HERO ---------- */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
padding-top:72px;
overflow:hidden;
}

/* background image */

.hero::before{
content:"";
position:absolute;
inset:0;
background:url("hero.png") center 25% / 125% no-repeat;
filter:brightness(.65);
}

/* dark overlay */

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
to bottom,
rgba(0,0,0,.35),
rgba(0,0,0,.8)
);
}

/* hero content */

.hero-content{
position:relative;
z-index:2;
max-width:900px;
padding:0 40px;
animation:fadeUp 1.4s ease;
}

/* eyebrow */

.eyebrow{
font-size:12px;
letter-spacing:.4em;
text-transform:uppercase;
color:rgba(255,255,255,.45);
margin-bottom:22px;
position:relative;
}

.eyebrow:before{
content:"";
display:block;
width:60px;
height:1px;
background:rgba(255,255,255,.4);
margin:0 auto 18px auto;
}

/* title */

.hero h1{
font-size:clamp(64px,9vw,120px);
font-weight:800;
letter-spacing:-.03em;
margin-bottom:18px;
}

/* subtitle */

.hero h2{
font-size:clamp(22px,3vw,34px);
font-weight:400;
color:rgba(255,255,255,.85);
letter-spacing:.02em;
}

/* ---------- ANIMATION ---------- */

@keyframes fadeUp{

0%{
opacity:0;
transform:translateY(30px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

/* ---------- MOBILE ---------- */

@media(max-width:768px){

nav{
padding:0 25px;
}

nav ul{
gap:22px;
}

.hero-content{
padding:0 24px;
}

.hero::before{
background:url("hero.png") center 25% / 160% no-repeat;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">
<div class="logo-box">N</div>
NERAIUM
</div>

<ul>
<li><a href="#">Technical</a></li>
<li><a href="#">Governance</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

<section class="hero">

<div class="hero-content">

<div class="eyebrow">Infrastructure Intelligence</div>

<h1>Neraium</h1>

<h2>Systemic Infrastructure Intelligence</h2>

</div>

</section>

</body>
</html>
