<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neraium | Systemic Infrastructure Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
left:0;
right:0;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 50px;
background:rgba(0,0,0,.9);
border-bottom:1px solid rgba(255,255,255,.06);
z-index:10;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-weight:600;
letter-spacing:.1em;
}

.logo-box{
width:32px;
height:32px;
border-radius:8px;
background:#fff;
color:#000;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}

nav ul{
display:flex;
gap:36px;
list-style:none;
}

nav a{
text-decoration:none;
color:rgba(255,255,255,.6);
font-size:12px;
letter-spacing:.18em;
text-transform:uppercase;
}

nav a:hover{
color:#fff;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding-top:70px;
position:relative;
overflow:hidden;
}

/* BACKGROUND IMAGE */

.hero::before{
content:"";
position:absolute;
inset:-10%;
background:url("hero.png") center 28% / 130% no-repeat;
filter:brightness(.68);
z-index:0;
will-change:transform;
}

/* GLOW + GRADIENT */

.hero::after{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(circle at center,
rgba(255,255,255,.08),
rgba(0,0,0,0) 45%),
linear-gradient(
to bottom,
rgba(0,0,0,.35),
rgba(0,0,0,.9)
);
z-index:1;
}

/* HERO CONTENT */

.hero-content{
position:relative;
z-index:2;
padding:0 30px;
max-width:900px;
}

/* EYEBROW */

.eyebrow{
font-size:12px;
letter-spacing:.35em;
text-transform:uppercase;
color:rgba(255,255,255,.45);
margin-bottom:20px;
}

/* TITLE */

.hero h1{
font-size:clamp(64px,9vw,110px);
font-weight:800;
letter-spacing:-.03em;
text-shadow:0 10px 30px rgba(0,0,0,.85);
}

/* SUBTITLE */

.hero h2{
margin-top:16px;
font-size:clamp(22px,3vw,32px);
font-weight:400;
color:rgba(255,255,255,.85);
}

/* MOBILE */

@media(max-width:768px){

nav{
padding:0 25px;
}

.hero::before{
background:url("hero.png") center 28% / 160% no-repeat;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">
<div class="logo-box">N</div>
NERAIUM
</div>

<ul>
<li><a href="#">Technical</a></li>
<li><a href="#">Governance</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

<section class="hero">

<div class="hero-content">

<div class="eyebrow">Infrastructure Intelligence</div>

<h1>Neraium</h1>

<h2>Systemic Infrastructure Intelligence</h2>

</div>

</section>

<script>

/* Subtle Parallax */

const hero = document.querySelector(".hero");

window.addEventListener("scroll", () => {

const scroll = window.scrollY;

hero.style.setProperty("--scroll", scroll);

document.querySelector(".hero::before");

});

document.addEventListener("scroll", () => {

const offset = window.scrollY * 0.15;

document.querySelector(".hero").style.backgroundPositionY = `${offset}px`;

});

</script>

</body>
</html>
