<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neraium | Systemic Infrastructure Intelligence</title>
<meta name="description" content="Neraium delivers systemic infrastructure intelligence for infrastructure operators and stakeholders. We ingest existing telemetry and provide trustworthy, reviewable insights." />

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
:root {
  --bg-0:#050b16;
  --bg-1:#091a33;
  --bg-2:#0f2649;
  --bg-3:#132d50;
  --card:#0b1730;
  --card-2:#0d1f3f;
  --text:#f2f6ff;
  --sub:rgba(242,246,255,0.78);
  --muted:rgba(242,246,255,0.55);
  --accent:#00b4ff;
  --accent-2:#46d0ff;
  --border:rgba(255,255,255,0.10);
  --border-2:rgba(255,255,255,0.16);
  --glow:rgba(0,180,255,0.28);
  --shadow:0 18px 60px rgba(0,0,0,0.45);
  --mono:'IBM Plex Mono', monospace;
  --sans:'Inter', sans-serif;
  --radius:14px;
  --radius-sm:10px;
  --max:1200px;
  --pad:24px;
  --nav-h:68px;
}

/* Reset & base styles */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--sans);
  background: radial-gradient(1200px 800px at 20% -10%, rgba(70,208,255,0.10), transparent 60%),
              radial-gradient(1000px 700px at 90% 10%, rgba(0,180,255,0.08), transparent 62%),
              linear-gradient(180deg, var(--bg-1), var(--bg-0) 55%, #03060d 100%);
  color:var(--text);
  line-height:1.65;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background-image:
    linear-gradient(rgba(0,180,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,255,0.035) 1px, transparent 1px);
  background-size:46px 46px;
  opacity:0.55;
}

.container{
  width:100%;
  max-width:var(--max);
  margin:0 auto;
  padding:0 var(--pad);
  position:relative;
  z-index:1;
}

/* Navigation */
nav{
  position:fixed;
  top:0; left:0; right:0;
  height:var(--nav-h);
  z-index:100;
  background:rgba(5,11,22,0.72);
  backdrop-filter: blur(14px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.nav-inner{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.nav-links{
  display:flex;
  gap:18px;
  list-style:none;
}
.nav-links a, .nav-cta{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:rgba(242,246,255,0.72);
  text-decoration:none;
  padding:10px 12px;
  border-radius:10px;
  transition:color .2s, background .2s;
}
.nav-links a:hover{color:var(--accent);}
.nav-cta{
  color:var(--bg-0);
  background:linear-gradient(135deg, var(--accent), var(--accent-2));
  border:1px solid rgba(255,255,255,0.10);
  box-shadow:0 10px 28px rgba(0,180,255,0.16);
}
.nav-cta:hover{filter:brightness(1.05);}

/* Hero Section */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  padding: calc(var(--nav-h) + 64px) 0 90px;
  overflow:hidden;
}
.hero-bg{
  position:absolute;
  inset:0;
  background-color:#02040a;
}
.hero-bg::before{
  content:"";
  position:absolute;
  inset:0;
  background: linear-gradient(
      180deg,
      rgba(25,70,190,0.6) 0%,
      rgba(12,32,78,0.8) 40%,
      rgba(4,8,18,0.94) 100%
    );
  z-index:2;
}
.hero-bg::after{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("hero.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  opacity:0.45; /* dim image more */
  transform:scale(0.9); /* smaller image */
  z-index:1;
}
@media (min-width: 980px){
  .hero-bg::after{ background-attachment:scroll; }
}
.hero-inner{
  position:relative;
  z-index:3;
  text-align:left;
}
.hero h2{
  font-size:clamp(42px, 6.2vw, 90px);
  letter-spacing:-2px;
  margin:0 0 12px;
  font-weight:800;
}
.hero h3{
  font-size:clamp(18px, 2.2vw, 28px);
  font-weight:500;
  color:rgba(242,246,255,0.85);
  margin-bottom:24px;
}
/* Additional sections omitted for brevity.  You can maintain your cards, system model, evidence, positioning, contact form, and footer from previous versions. */
</style>
</head>

<body>
<nav>
  <div class="container nav-inner">
    <!-- brand mark removed -->
    <ul class="nav-links">
      <li><a href="#contact">Contact</a></li>
      <li><a href="technical.html">Technical</a></li>
      <li><a href="#governance">Governance</a></li>
    </ul>
    <a class="nav-cta" href="#contact">Get in Touch</a>
  </div>
</nav>

<header class="hero" id="top">
  <div class="hero-bg" aria-hidden="true"></div>
  <div class="container hero-inner">
    <h2>NERAIUM</h2>
    <h3>Systemic Infrastructure Intelligence</h3>
    <p style="max-width:700px;color:var(--sub)">
      We ingest your telemetry, detect structural deviation, and deliver reviewable intelligence for better infrastructure management. No control, no interference—just clarity.
    </p>
  </div>
</header>

</body>
</html>
