<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NERAIUM | Systemic Infrastructure Intelligence</title>
  <meta name="description" content="Neraium is a read only systemic infrastructure intelligence layer for telemetry review, deviation analysis, and evidence grade records." />

  <meta property="og:title" content="NERAIUM | Systemic Infrastructure Intelligence" />
  <meta property="og:description" content="Read only infrastructure intelligence for telemetry review, deviation analysis, and evidence grade records." />
  <meta property="og:type" content="website" />

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-0:#04070e;
      --bg-1:#070b16;
      --bg-2:#0a1022;
      --bg-3:#0c1430;

      --card:#0a1020;
      --card-2:#0b1326;

      --text:#eaf2ff;
      --muted:rgba(234,242,255,0.72);
      --muted-2:rgba(234,242,255,0.50);

      --accent:#2e73ff;
      --accent-2:#46d5ff;

      --line:rgba(140,170,240,0.10);
      --line-2:rgba(140,170,240,0.18);

      --shadow: 0 18px 55px rgba(0,0,0,0.40);
      --shadow-soft: 0 10px 32px rgba(0,0,0,0.30);

      --mono:'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans:'IBM Plex Sans', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      --r:14px;

      --hero-shift: 0px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:var(--sans);
      background: radial-gradient(1200px 700px at 10% 0%, rgba(46,115,255,0.12), transparent 60%),
                  radial-gradient(900px 500px at 90% 10%, rgba(70,213,255,0.10), transparent 60%),
                  linear-gradient(180deg, var(--bg-0), var(--bg-1));
      color:var(--text);
      line-height:1.6;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* subtle grid */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(70,213,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(70,213,255,0.018) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity:0.9;
      z-index:0;
    }

    a{color:inherit}
    .container{
      width:100%;
      max-width:1200px;
      margin:0 auto;
      padding:0 22px;
      position:relative;
      z-index:2;
    }

    /* NAV */
    .nav{
      position:fixed;
      top:0; left:0; right:0;
      z-index:60;
      background: rgba(4,7,14,0.74);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }
    .nav-inner{
      height:64px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
    }
    .brand{
      display:flex;
      align-items:baseline;
      gap:10px;
      text-decoration:none;
      white-space:nowrap;
    }
    .brand strong{
      font-family:var(--mono);
      letter-spacing:4px;
      font-weight:800;
      font-size:13px;
      color:rgba(234,242,255,0.94);
    }
    .brand span{
      font-family:var(--mono);
      letter-spacing:2px;
      font-size:10px;
      color:rgba(70,213,255,0.70);
      text-transform:uppercase;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:22px;
      list-style:none;
      margin:0;
      padding:0;
    }
    .nav-links a{
      font-family:var(--mono);
      font-size:10px;
      letter-spacing:2px;
      text-transform:uppercase;
      text-decoration:none;
      color: rgba(234,242,255,0.66);
      padding:8px 6px;
      border-bottom: 1px solid transparent;
      transition: 0.2s ease;
    }
    .nav-links a:hover{
      color: rgba(234,242,255,0.92);
      border-bottom-color: rgba(46,115,255,0.55);
    }
    .nav-cta{
      display:flex;
      align-items:center;
      gap:10px;
      flex-shrink:0;
    }
    .btn{
      font-family:var(--mono);
      font-size:10px;
      letter-spacing:2px;
      text-transform:uppercase;
      text-decoration:none;
      padding:10px 14px;
      border-radius:12px;
      border: 1px solid var(--line-2);
      background: rgba(10,16,32,0.55);
      color: rgba(234,242,255,0.86);
      transition: 0.22s ease;
      display:inline-flex;
      align-items:center;
      gap:8px;
      white-space:nowrap;
    }
    .btn:hover{
      border-color: rgba(46,115,255,0.55);
      background: rgba(10,16,32,0.75);
      box-shadow: var(--shadow-soft);
    }
    .btn.primary{
      border-color: rgba(46,115,255,0.55);
      background: linear-gradient(180deg, rgba(46,115,255,0.24), rgba(10,16,32,0.55));
      color: rgba(234,242,255,0.95);
    }
    .btn.primary:hover{
      border-color: rgba(70,213,255,0.55);
    }

    .hamburger{
      display:none;
      width:42px; height:42px;
      border-radius:12px;
      border:1px solid var(--line);
      background: rgba(10,16,32,0.55);
      color: rgba(234,242,255,0.86);
      cursor:pointer;
    }
    .hamburger:active{transform: translateY(1px)}
    .hamburger svg{display:block;margin:auto}
    .mobile-panel{
      display:none;
      border-top:1px solid var(--line);
      background: rgba(4,7,14,0.86);
      backdrop-filter: blur(18px);
    }
    .mobile-panel .container{
      padding-top:10px;
      padding-bottom:14px;
    }
    .mobile-panel a{
      display:block;
      padding:12px 6px;
      font-family:var(--mono);
      font-size:10px;
      letter-spacing:2px;
      text-transform:uppercase;
      text-decoration:none;
      color: rgba(234,242,255,0.74);
      border-bottom:1px solid var(--line);
    }
    .mobile-panel a:last-child{border-bottom:none}

    /* HERO */
    .hero{
      position:relative;
      padding: 132px 0 72px;
      overflow:hidden;
      border-bottom: 1px solid var(--line);
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:-1px;
      background:
        linear-gradient(
          180deg,
          rgba(46,115,255,0.52) 0%,
          rgba(18,38,86,0.84) 42%,
          rgba(4,7,14,0.96) 100%
        ),
        url("hero.png");
      background-size: cover;
      background-repeat:no-repeat;
      background-position: center calc(50% + var(--hero-shift));
      opacity: 1;
      z-index:0;
      transform: scale(1.02);
      filter: saturate(1.05) contrast(1.02);
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background: radial-gradient(900px 420px at 12% 18%, rgba(70,213,255,0.10), transparent 60%),
                  radial-gradient(800px 360px at 88% 22%, rgba(46,115,255,0.12), transparent 60%);
      z-index:0;
      pointer-events:none;
    }

    .hero-inner{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 34px;
      align-items:end;
    }

    .wordmark{
      font-family:var(--sans);
      font-weight:800;
      letter-spacing: 8px;
      font-size: clamp(44px, 6vw, 92px);
      line-height: 0.95;
      margin:0 0 10px;
      text-transform:uppercase;
      color: rgba(234,242,255,0.96);
      text-shadow: 0 18px 55px rgba(0,0,0,0.35);
    }
    .tagline{
      font-family:var(--sans);
      font-size: clamp(18px, 2.2vw, 34px);
      font-weight:600;
      margin:0 0 16px;
      color: rgba(234,242,255,0.92);
      letter-spacing: -0.5px;
    }
    .lead{
      margin:0;
      max-width: 720px;
      font-size: 16px;
      color: rgba(234,242,255,0.76);
    }
    .lead b{color: rgba(234,242,255,0.92); font-weight:600}

    .hero-actions{
      display:flex;
      gap:12px;
      justify-content:flex-end;
      flex-wrap:wrap;
      padding-bottom: 6px;
    }

    .badge-row{
      margin-top: 22px;
      display:flex;
      gap: 12px;
      flex-wrap:wrap;
      align-items:center;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(140,170,240,0.16);
      background: rgba(6,10,18,0.55);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.6px;
      text-transform:uppercase;
      color: rgba(234,242,255,0.78);
      white-space:nowrap;
    }
    .dot{
      width:8px;height:8px;border-radius:999px;
      background: rgba(70,213,255,0.95);
      box-shadow: 0 0 16px rgba(70,213,255,0.35);
    }

    /* SECTION */
    section{
      padding: 72px 0;
      border-bottom: 1px solid var(--line);
      position:relative;
      z-index:2;
    }
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:20px;
      margin-bottom: 22px;
    }
    .kicker{
      font-family:var(--mono);
      font-size: 10px;
      letter-spacing: 3px;
      text-transform:uppercase;
      color: rgba(70,213,255,0.70);
      margin:0 0 10px;
    }
    h2{
      margin:0;
      font-size: clamp(26px, 3vw, 38px);
      letter-spacing:-0.4px;
      line-height:1.15;
    }
    .sub{
      margin:10px 0 0;
      color: var(--muted);
      max-width: 720px;
      font-size: 14px;
    }

    /* Cards */
    .grid-3{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .card{
      border-radius: var(--r);
      border: 1px solid rgba(140,170,240,0.14);
      background: linear-gradient(180deg, rgba(11,19,38,0.82), rgba(7,11,22,0.82));
      box-shadow: 0 10px 32px rgba(0,0,0,0.22);
      padding: 18px 18px;
      min-height: 150px;
    }
    .card .label{
      font-family:var(--mono);
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform:uppercase;
      color: rgba(46,115,255,0.92);
      margin:0 0 10px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .card .label::before{
      content:"";
      width:10px;height:2px;border-radius:2px;
      background: rgba(70,213,255,0.75);
      box-shadow: 0 0 16px rgba(70,213,255,0.20);
    }
    .card h3{
      margin:0 0 8px;
      font-size: 16px;
      letter-spacing:-0.2px;
    }
    .card p{
      margin:0;
      color: var(--muted);
      font-size: 13px;
      line-height:1.7;
    }

    /* Validation stats */
    .stats{
      margin-top: 14px;
      border-radius: var(--r);
      border: 1px solid rgba(140,170,240,0.16);
      background: linear-gradient(180deg, rgba(10,16,32,0.80), rgba(7,11,22,0.80));
      overflow:hidden;
      box-shadow: var(--shadow-soft);
    }
    .stats-top{
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:space-between;
      padding: 14px 16px;
      border-bottom:1px solid rgba(140,170,240,0.12);
      background: rgba(70,213,255,0.04);
      flex-wrap:wrap;
    }
    .stats-top strong{
      font-family:var(--mono);
      letter-spacing:2px;
      text-transform:uppercase;
      font-size:10px;
      color: rgba(234,242,255,0.86);
    }
    .stats-top span{
      font-family:var(--mono);
      font-size:10px;
      letter-spacing:1.6px;
      color: rgba(234,242,255,0.56);
      text-transform:uppercase;
    }
    .stats-grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: rgba(140,170,240,0.12);
    }
    .stat{
      background: rgba(6,10,18,0.65);
      padding: 16px 16px;
    }
    .stat .v{
      font-size: 26px;
      font-weight:800;
      letter-spacing:-0.6px;
      color: rgba(234,242,255,0.94);
    }
    .stat .k{
      margin-top: 6px;
      font-family:var(--mono);
      font-size:10px;
      letter-spacing:2px;
      text-transform:uppercase;
      color: rgba(234,242,255,0.60);
      line-height:1.35;
    }
    .stat .v.accent{color: rgba(70,213,255,0.92)}
    .note{
      margin-top: 12px;
      color: rgba(234,242,255,0.54);
      font-size: 12px;
      max-width: 880px;
    }

    /* System boundary block */
    .boundary{
      border-radius: var(--r);
      border: 1px solid rgba(140,170,240,0.16);
      background: linear-gradient(180deg, rgba(11,19,38,0.74), rgba(7,11,22,0.82));
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .boundary-h{
      padding: 14px 16px;
      border-bottom:1px solid rgba(140,170,240,0.12);
      background: rgba(46,115,255,0.06);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .boundary-h .title{
      font-family:var(--mono);
      font-size:10px;
      letter-spacing:2.5px;
      text-transform:uppercase;
      color: rgba(234,242,255,0.86);
    }
    .boundary-h .pill{
      font-family:var(--mono);
      font-size:10px;
      letter-spacing:2px;
      text-transform:uppercase;
      padding:8px 10px;
      border-radius: 999px;
      border:1px solid rgba(140,170,240,0.16);
      background: rgba(6,10,18,0.55);
      color: rgba(234,242,255,0.70);
      white-space:nowrap;
    }
    .boundary-grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(140,170,240,0.12);
    }
    .boundary-cell{
      background: rgba(6,10,18,0.62);
      padding: 16px 16px;
      min-height: 120px;
    }
    .boundary-cell h4{
      margin:0 0 10px;
      font-family:var(--mono);
      font-size:10
