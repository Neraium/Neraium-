<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Neraium is a read-only infrastructure intelligence layer for high-consequence water systems." />
  <title>Neraium</title>

  <style>
    :root{
      --bg0:#071426;
      --bg1:#0b1f3a;
      --card:rgba(255,255,255,.06);
      --card2:rgba(255,255,255,.09);
      --text:#ffffff;
      --muted:rgba(255,255,255,.70);
      --muted2:rgba(255,255,255,.55);
      --accent:#2e6df6;
      --accent2:#1f56d9;
      --ring:rgba(46,109,246,.35);
      --border:rgba(255,255,255,.12);
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius: 14px;
      --radius2: 18px;
      --max: 1120px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,Arial,sans-serif;
      background:
        radial-gradient(1000px 500px at 20% -10%, rgba(46,109,246,.25), transparent 60%),
        radial-gradient(900px 500px at 85% 10%, rgba(120,82,255,.22), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      line-height:1.45;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{color:inherit}
    .wrap{max-width:var(--max); margin:0 auto; padding:0 22px}
    .topbar{
      position:sticky; top:0;
      backdrop-filter: blur(14px);
      background: linear-gradient(180deg, rgba(7,20,38,.78), rgba(7,20,38,.35));
      border-bottom: 1px solid rgba(255,255,255,.08);
      z-index:10;
    }
    .nav{
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 0;
      gap:18px;
    }
    .brand{
      display:flex; align-items:center; gap:12px;
      font-weight:800; letter-spacing:.08em;
      text-transform:uppercase;
      font-size:14px;
    }
    .dot{
      width:12px; height:12px; border-radius:999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(46,109,246,.18);
    }
    .links{
      display:flex; gap:18px; flex-wrap:wrap;
      align-items:center;
      color:var(--muted2);
      font-size:13px;
    }
    .links a{
      text-decoration:none;
      padding:8px 10px;
      border-radius:10px;
      border: 1px solid transparent;
    }
    .links a:hover{
      color:var(--text);
      border-color: rgba(255,255,255,.14
