<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neraium | Systemic Infrastructure Intelligence</title>

<meta name="description" content="Neraium is systemic infrastructure intelligence for critical physical systems. Read only. No actuation. Operator authority preserved.">

<link rel="icon" href="favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#050505;
--panel:rgba(255,255,255,0.04);
--text:rgba(255,255,255,0.92);
--sub:rgba(255,255,255,0.68);
--border:rgba(255,255,255,0.10);
--accent:#58c8ff;
--accent-2:#9fe2ff;
--mono:'IBM Plex Mono', monospace;
--sans:Inter, system-ui, sans-serif;
--max:1180px;
--pad:24px;
--navh:72px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
font-family:var(--sans);
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* GRID BACKGROUND */

body:before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background-image:
linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
background-size:64px 64px;
opacity:.55;
}

/* CONTAINER */

.container{
width:100%;
max-width:var(--max);
margin:auto;
padding:0 var(--pad);
}

/* NAV */

nav{
position:fixed;
top:0;
left:0;
right:0;
height:var(--navh);
background:rgba(5,5,5,0.72);
backdrop-filter: blur(18px);
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:100;
}

.nav-inner{
display:flex;
align-items:center;
justify-content:space-between;
height:100%;
}

.nav-links{
display:flex;
gap:20px;
list-style:none;
}

.nav-links a{
font-family:var(--mono);
font-size:10px;
letter-spacing:.22em;
text-transform:uppercase;
color:rgba(255,255,255,.68);
text-decoration:none;
}

.nav-cta{
font-family:var(--mono);
font-size:10px;
letter-spacing:.22em;
text-transform:uppercase;
text-decoration:none;
color:#050505;
background:linear-gradient(135deg,var(--accent),var(--accent-2));
padding:10px 14px;
border-radius:12px;
}

/* HERO */

.hero{
position:relative;
min-height:100vh;
display:flex;
align-items:center;
padding:calc(var(--navh) + 54px) 0 86px;
overflow:hidden;
}

.hero:before{
content:"";
position:absolute;
inset:-6%;
background-image:url("hero.png");
background-size:cover;
background-position:50% 52%;
background-repeat:no-repeat;

filter:brightness(0.88) contrast(1.05) saturate(0.95);

transform:scale(1.02);
z-index:0;
}

.hero:after{
content:"";
position:absolute;
inset:0;
background:
radial-gradient(900px 520px at 50% 40%, rgba(88,200,255,0.10), transparent 60%),
linear-gradient(180deg,
rgba(5,5,5,0.30) 0%,
rgba(5,5,5,0.52) 42%,
rgba(5,5,5,0.82) 100%
);
z-index:1;
}

.hero-inner{
position:relative;
z-index:2;
max-width:860px;
}

.badge{
display:inline-flex;
align-items:center;
gap:10px;
padding:10px 14px;
border-radius:999px;
border:1px solid rgba(255,255,255,0.14);
background:rgba(0,0,0,0.35);
font-family:var(--mono);
font-size:10px;
letter-spacing:.22em;
text-transform:uppercase;
}

.hero h1{
margin-top:18px;
font-size:clamp(54px,9vw,104px);
letter-spacing:-.03em;
line-height:.95;
}

.hero h2{
margin-top:14px;
font-size:clamp(18px,2.2vw,26px);
font-weight:400;
color:rgba(255,255,255,0.78);
}

.hero p{
margin-top:18px;
max-width:760px;
color:rgba(255,255,255,0.72);
font-size:17px;
line-height:1.8;
}

.hero-actions{
margin-top:26px;
display:flex;
gap:12px;
}

.btn{
display:inline-flex;
align-items:center;
justify-content:center;
font-family:var(--mono);
font-size:11px;
letter-spacing:.22em;
text-transform:uppercase;
text-decoration:none;
padding:13px 16px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.12);
background:rgba(0,0,0,0.28);
color:white;
}

.btn.primary{
background:linear-gradient(135deg,var(--accent),var(--accent-2));
color:#050505;
}

/* SECTION */

.section{
padding:96px 0;
border-top:1px solid rgba(255,255,255,0.07);
}

.h-kicker{
font-family:var(--mono);
font-size:11px;
letter-spacing:.22em;
text-transform:uppercase;
color:rgba(255,255,255,.55);
}

.h2{
margin-top:10px;
font-size:40px;
}

.lead{
margin-top:14px;
color:var(--sub);
max-width:820px;
line-height:1.75;
}

.grid{
margin-top:28px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
}

.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba
