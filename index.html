<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NERAIUM | Infrastructure Intelligence Platform</title>
<meta name="description" content="Neraium is a read-only systemic infrastructure intelligence platform for telemetry review, deviation analysis, and reviewable records.">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg-0: #020408;
  --bg-1: #0a0f1a;
  --bg-2: #111827;
  --bg-3: #1a2332;
  --bg-card: #0d1320;
  --text-primary: #f0f4f8;
  --text-secondary: #94a3b8;
  --text-muted: #475569;
  --accent: #00d4ff;
  --accent-bright: #38e8ff;
  --accent-dim: rgba(0,212,255,0.15);
  --accent-glow: rgba(0,212,255,0.4);
  --success: #10b981;
  --warning: #f59e0b;
  --border: rgba(148,163,184,0.08);
  --border-active: rgba(0,212,255,0.25);
  --grid-line: rgba(0,212,255,0.03);
  --font-mono: 'IBM Plex Mono', monospace;
  --font-sans: 'Inter', sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  background: var(--bg-0);
  color: var(--text-primary);
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Palantir-style grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* Scanning line effect */
.scan-line {
  position: fixed;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 50%, transparent 100%);
  box-shadow: 0 0 20px var(--accent-glow);
  animation: scanDown 8s linear infinite;
  pointer-events: none;
  z-index: 100;
  opacity: 0.6;
}

@keyframes scanDown {
  0% { top: -2px; opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { top: 100vh; opacity: 0; }
}

/* Ambient orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(100px);
}
.orb-1 {
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
  top: -200px;
  right: -100px;
}
.orb-2 {
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(16,185,129,0.06) 0%, transparent 70%);
  bottom: 10%;
  left: -100px;
}

.container {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 48px;
  position: relative;
  z-index: 2;
}

/* Navigation - Palantir style */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(2,4,8,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  gap: 32px;
}

.nav-brand {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--text-primary);
  text-decoration: none;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-brand::before {
  content: '◆';
  color: var(--accent);
  font-size: 12px;
}

.nav-links {
  display: flex;
  gap: 40px;
  list-style: none;
  align-items: center;
}

.nav-links a {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-secondary);
  text-decoration: none;
  transition: all 0.2s;
  font-weight: 500;
  position: relative;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--accent);
  transition: width 0.2s;
}

.nav-links a:hover { 
  color: var(--text-primary); 
}

.nav-links a:hover::after {
  width: 100%;
}

.nav-cta {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 600;
  padding: 10px 24px;
  background: var(--accent-dim);
  border: 1px solid var(--border-active);
  color: var(--accent);
  text-decoration: none;
  transition: all 0.25s;
  flex-shrink: 0;
}

.nav-cta:hover {
  background: var(--accent);
  color: var(--bg-0);
  box-shadow: 0 0 30px var(--accent-glow);
}

/* Hero Section */
.hero-section {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 140px 0 100px;
  position: relative;
  background: linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
}

.hero-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  opacity: 0.4;
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 900px;
}

/* Palantir-style badge */
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 24px;
  padding: 8px 16px;
  border: 1px solid var(--border-active);
  background: rgba(0,212,255,0.05);
}

.hero-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--success);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.hero-wordmark {
  font-family: var(--font-sans);
  font-size: 120px;
  font-weight: 800;
  letter-spacing: -2px;
  line-height: 0.9;
  color: var(--text-primary);
  margin-bottom: 8px;
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-tagline {
  font-family: var(--font-mono);
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 32px;
  font-weight: 500;
}

h1.hero-title {
  font-family: var(--font-sans);
  font-size: 48px;
  font-weight: 600;
  letter-spacing: -0.5px;
  line-height: 1.1;
  color: var(--text-primary);
  margin-bottom: 24px;
  max-width: 700px;
}

.hero-body {
  font-size: 18px;
  font-weight: 400;
  color: var(--text-secondary);
  max-width: 640px;
  line-height: 1.7;
  margin-bottom: 40px;
}

.hero-actions {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 60px;
}

.btn-primary {
  padding: 14px 32px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 600;
  background: var(--accent);
  color: var(--bg-0);
  border: none;
  cursor: pointer;
  transition: all 0.3s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary:hover {
  background: var(--accent-bright);
  box-shadow: 0 0 40px var(--accent-glow);
  transform: translateY(-1px);
}

.btn-secondary {
  padding: 14px 32px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 600;
  background: transparent;
  color: var(--text-primary);
  border: 1px solid var(--border-active);
  cursor: pointer;
  transition: all 0.3s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,255,0.05);
}

/* Hero metrics bar */
.hero-metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  max-width: 800px;
}

.metric-item {
  background: var(--bg-card);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.metric-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 500;
}

.metric-value {
  font-family: var(--font-sans);
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
}

.metric-value.accent {
  color: var(--accent);
}

/* Research panel - Palantir card style */
.research-panel {
  padding: 0 0 100px;
  position: relative;
  z-index: 2;
}

.research-panel-inner {
  border: 1px solid var(--border);
  background: var(--bg-card);
  position: relative;
  overflow: hidden;
}

.research-panel-inner::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
}

.research-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 20px 24px;
  background: rgba(0,212,255,0.03);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.research-label {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
}

.research-label::before {
  content: '▸';
  font-size: 14px;
}

.research-note {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1px;
  color: var(--text-muted);
}

.research-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
}

.research-card {
  background: var(--bg-card);
  padding: 32px 24px;
  position: relative;
  transition: all 0.3s;
}

.research-card:hover {
  background: var(--bg-2);
}

.research-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 2px;
  height: 0;
  background: var(--accent);
  transition: height 0.3s;
}

.research-card:hover::before {
  height: 100%;
}

.research-card h3 {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
  font-weight: 600;
}

.research-card p {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-secondary);
}

/* Sections */
section {
  padding: 120px 0;
  border-top: 1px solid var(--border);
  position: relative;
  z-index: 2;
}

.section-header {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 60px;
  margin-bottom: 64px;
  align-items: start;
}

.sec-tag {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-top: 8px;
  position: relative;
}

.sec-tag::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  width: 40px;
  height: 2px;
  background: var(--accent);
}

.sec-num {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 700;
}

.sec-cat {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
}

h2.sec-title {
  font-family: var(--font-sans);
  font-size: 42px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1.1;
  color: var(--text-primary);
  margin-bottom: 20px;
}

.sec-body {
  font-size: 17px;
  font-weight: 400;
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 600px;
}

/* Card grids - Palantir dense data style */
.cap-grid,
.deploy-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.cap-item,
.deploy-item {
  background: var(--bg-card);
  padding: 40px 32px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.cap-item:hover,
.deploy-item:hover { 
  background: var(--bg-2); 
}

.cap-item::before,
.deploy-item::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
  opacity: 0;
  transition: opacity 0.3s;
}

.cap-item:hover::before,
.deploy-item:hover::before {
  opacity: 1;
}

.cap-num,
.deploy-num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.cap-num::before,
.deploy-num::before {
  content: '//';
  color: var(--text-muted);
}

.cap-title,
.deploy-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
  letter-spacing: -0.3px;
}

.cap-text,
.deploy-text {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* Architecture - Palantir flow style */
.arch-flow {
  display: grid;
  grid-template-columns: 1fr 60px 1fr 60px 1fr;
  align-items: stretch;
  gap: 0;
}

.arch-node {
  border: 1px solid var(--border);
  background: var(--bg-card);
  padding: 48px 32px;
  text-align: left;
  transition: all 0.3s;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.arch-node:hover {
  background: var(--bg-2);
  border-color: var(--border-active);
}

.arch-node::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
}

.arch-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 16px;
}

.arch-title {
  font-size: 24px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 16px;
  letter-spacing: -0.5px;
}

.arch-text {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.arch-arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  font-size: 24px;
  opacity: 0.3;
  font-family: var(--font-mono);
}

/* Evidence list - Palantir table style */
.evidence-wrap {
  border: 1px solid var(--border);
  background: var(--bg-card);
}

.evidence-row {
  display: grid;
  grid-template-columns: 240px 1fr;
  border-bottom: 1px solid var(--border);
  transition: background 0.2s;
}

.evidence-row:hover {
  background: rgba(0,212,255,0.02);
}

.evidence-row:last-child { border-bottom: none; }

.evidence-key {
  padding: 24px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
}

.evidence-value {
  padding: 24px;
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-secondary);
}

/* Positioning rows - Palantir comparison table */
.pos-wrap {
  border: 1px solid var(--border);
  background: var(--bg-card);
}

.pos-row {
  display: grid;
  grid-template-columns: 220px 1fr 1fr;
  gap: 0;
  border-bottom: 1px solid var(--border);
}

.pos-row:first-child {
  background: rgba(0,212,255,0.05);
}

.pos-row:last-child { border-bottom: none; }

.pos-cell {
  padding: 20px 24px;
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.6;
  border-right: 1px solid var(--border);
}

.pos-cell:last-child { border-right: none; }

.pos-cell.header {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 600;
  padding: 16px 24px;
}

.pos-cell.label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
}

/* Contact */
#contact {
  padding: 120px 0;
  border-top: 1px solid var(--border);
  position: relative;
  z-index: 2;
  background: linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
}

.contact-grid {
  display: grid;
  grid-template-columns: 400px 1fr;
  gap: 80px;
  align-items: start;
}

.contact-left h2 {
  font-family: var(--font-sans);
  font-size: 42px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1.1;
  color: var(--text-primary);
  margin-bottom: 20px;
}

.contact-left p {
  font-size: 17px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 40px;
}

.contact-info-block {
  display: flex;
  flex-direction: column;
  gap: 0;
  border: 1px solid var(--border);
  background: var(--bg-card);
}

.contact-info-row {
  display: grid;
  grid-template-columns: 100px 1fr;
  border-bottom: 1px solid var(--border);
}

.contact-info-row:last-child { border-bottom: none; }

.ci-key {
  padding: 16px 20px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 600;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
}

.ci-val {
  padding: 16px 20px;
  font-size: 14px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
}

.ci-val a {
  color: var(--text-primary);
  text-decoration: none;
  transition: color 0.2s;
  font-weight: 500;
}

.ci-val a:hover { color: var(--accent); }

.contact-form-wrap {
  border: 1px solid var(--border);
  background: var(--bg-card);
  position: relative;
}

.contact-form-wrap::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
}

.form-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,212,255,0.03);
}

.form-header-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 600;
}

.form-header-label::before {
  content: '▸ ';
}

.contact-form {
  padding: 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.form-row-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.form-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  font-weight: 600;
}

.form-input,
.form-select,
.form-textarea {
  background: var(--bg-0);
  border: 1px solid var(--border);
  padding: 14px 16px;
  font-family: var(--font-sans);
  font-size: 15px;
  color: var(--text-primary);
  outline: none;
  transition: all 0.2s;
  appearance: none;
  -webkit-appearance: none;
}

.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
}

.form-select {
  cursor: pointer;
