<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neraium Analysis</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="nav">
<div class="nav-inner container">

<a class="brand" href="index.html">Nera<span>ium</span></a>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="platform.html">Platform</a>
<a href="governance.html">Governance</a>
</div>

</div>
</nav>

<section class="hero">
<div class="container">

<h1>Upload telemetry data</h1>

<p class="lead">
Upload CSV telemetry data for infrastructure analysis.
</p>

</div>
</section>

<section class="section">
<div class="container">

<div class="upload-box">

<input type="file" id="file">

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

<div id="status"></div>

</div>

</div>
</section>

<footer class="footer">
© Neraium
</footer>

<script>

const fileInput = document.getElementById("file")
const bar = document.getElementById("progress")
const status = document.getElementById("status")

fileInput.addEventListener("change", () => {

const file = fileInput.files[0]

const xhr = new XMLHttpRequest()

xhr.upload.onprogress = function(e){

if(e.lengthComputable){

const percent = (e.loaded / e.total) * 100
bar.style.width = percent + "%"

}

}

xhr.onload = function(){

status.innerHTML = "Analysis complete"

}

const form = new FormData()
form.append("file", file)

xhr.open("POST","https://api.neraium.com/analyze")
xhr.send(form)

})

</script>

</body>
</html>
