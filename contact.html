<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Neraium</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html"><span class="brand-mark">N</span><span class="brand-text">Neraium</span></a>
      <nav class="nav">
        <a href="platform.html">Platform</a>
        <a href="technical.html">Technical</a>
        <a href="governance.html">Governance</a>
        <a href="contact.html" class="button ghost active">Contact</a>
      </nav>
    </header>

    <main class="section split">
      <div>
        <p class="eyebrow">Contact</p>
        <h1>Build with Neraium.</h1>
        <p>
          Whether you are designing a mission dashboard, telemetry backbone, or
          governed decision workflow, Neraium can be configured to fit your environment.
        </p>
      </div>
      <form class="card contact-form">
        <label>Name<input type="text" placeholder="Your name" /></label>
        <label>Email<input type="email" placeholder="you@example.com" /></label>
        <label>Organization<input type="text" placeholder="Organization" /></label>
        <label>What are you building?<textarea rows="5" placeholder="Tell us about your use case."></textarea></label>
        <button class="button" type="button">Request a demo</button>
      </form>
    </main>

    <footer class="footer">
      <span>© 2026 Neraium</span>
      <div><a href="index.html">Home</a><a href="platform.html">Platform</a></div>
    </footer>
  </div>
  <script src="telemetry.js"></script>
</body>
</html>
